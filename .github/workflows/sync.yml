name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          # We keep lfs: false because the CLI upload will handle large files 
          # via the HF Hub API directly, bypassing the need for git-lfs tracking.
          lfs: false
          
      - name: Install Hugging Face Hub with XET support
        run: pip install -U "huggingface_hub[hf_xet]"

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Login non-interactively
          hf auth login --token $HF_TOKEN
          
          # Upload the current directory to the Space
          hf upload essainsham/UAE-Real-Estate-Agent . \
            --repo-type=space \
            --commit-message="Sync from GitHub Actions via CLI"